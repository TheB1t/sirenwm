name: Build (Wayland backend)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  build-wayland:
    name: Wayland / ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian:trixie
            label: Debian trixie
            slug: debian-trixie
          - distro: archlinux:latest
            label: Arch Linux
            slug: arch
    container:
      image: ${{ matrix.distro }}
      options: --ulimit core=-1 --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Debian)
        if: startsWith(matrix.distro, 'debian')
        run: |
          apt-get update -qq
          echo "--- wlroots packages available ---"
          apt-cache search wlroots || true
          WLROOTS_PKG=$(apt-cache search '^libwlroots' | awk '{print $1}' | grep '\-dev$' | head -1)
          echo "Using wlroots package: $WLROOTS_PKG"
          apt-get install -y --no-install-recommends \
            cmake make pkg-config gcc g++ git ca-certificates ccache \
            binutils \
            liblua5.4-dev libspdlog-dev \
            libcairo2-dev libpango1.0-dev \
            libfontconfig1-dev libfreetype-dev libpng-dev \
            fonts-dejavu-core \
            $WLROOTS_PKG \
            libwayland-dev libwayland-bin wayland-protocols \
            libxkbcommon-dev libpixman-1-dev \
            libdrm-dev libgbm-dev libegl-dev \
            libinput-dev libudev-dev libseat-dev \
            libxcb1-dev libxcb-composite0-dev \
            libxcb-xfixes0-dev libxcb-xinput-dev \
            libxcb-randr0-dev libxcb-icccm4-dev \
            libx11-dev libx11-xcb-dev \
            libxcb-keysyms1-dev libxkbfile-dev libxfixes-dev \
            xvfb x11-utils wayland-utils weston

      - name: Install dependencies (Arch)
        if: startsWith(matrix.distro, 'archlinux')
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm
          echo "--- wlroots packages available ---"
          pacman -Ss wlroots || true
          pacman -S --noconfirm \
            cmake make pkgconf gcc git binutils python ccache \
            lua spdlog \
            cairo pango fontconfig freetype2 libpng \
            ttf-dejavu \
            wlroots0.18 \
            wayland wayland-protocols \
            libxkbcommon pixman \
            libdrm mesa libinput seatd \
            libxcb xcb-util-keysyms xcb-util-wm \
            libx11 libxfixes \
            xorg-server-xvfb xorg-xdpyinfo wayland-utils weston

      - uses: ./.github/actions/build-and-test
        with:
          backend: wayland
          ccache-key: wayland-${{ matrix.slug }}
          artifact-name: coredumps-wayland-${{ matrix.slug }}
          integration-cmd: timeout 120 bash tests/integration/run_tests_wayland.sh
          extra-artifact-paths: /tmp/sirenwm-wl-itest/
