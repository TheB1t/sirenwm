name: Build (X11 backend)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  build-ubuntu:
    name: X11 / Ubuntu ${{ matrix.version }} (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        version: ["24.04"]
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
            apt_extra: ""
          - compiler: clang
            cc: clang
            cxx: clang++
            apt_extra: "clang"
    container:
      image: ubuntu:${{ matrix.version }}
      options: --ulimit core=-1 --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake make pkg-config g++ git ca-certificates ccache \
            libx11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-keysyms1-dev \
            libxkbcommon-dev libxkbfile-dev libxfixes-dev liblua5.4-dev \
            libcairo2-dev libpango1.0-dev \
            libfontconfig1-dev libfreetype-dev libpng-dev \
            libspdlog-dev \
            fonts-dejavu-core \
            ${{ matrix.apt_extra }}

      - uses: ./.github/actions/build-and-test
        with:
          cc: ${{ matrix.cc }}
          cxx: ${{ matrix.cxx }}
          ccache-key: x11-ubuntu-${{ matrix.version }}-${{ matrix.compiler }}
          artifact-name: coredumps-x11-ubuntu-${{ matrix.version }}-${{ matrix.compiler }}

  sanitizers:
    name: X11 / Sanitizers (ASan+UBSan, clang)
    runs-on: ubuntu-latest
    needs: checks
    container:
      image: ubuntu:24.04
      options: --ulimit core=-1 --privileged
    env:
      CFLAGS: -fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g
      CXXFLAGS: -fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g
      LDFLAGS: -fsanitize=address,undefined
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake make pkg-config clang libclang-rt-18-dev git ca-certificates ccache \
            libx11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-keysyms1-dev \
            libxkbcommon-dev libxkbfile-dev libxfixes-dev liblua5.4-dev \
            libcairo2-dev libpango1.0-dev \
            libfontconfig1-dev libfreetype-dev libpng-dev \
            libspdlog-dev \
            fonts-dejavu-core

      - uses: ./.github/actions/build-and-test
        with:
          cc: clang
          cxx: clang++
          ccache-key: x11-sanitizers
          artifact-name: coredumps-x11-sanitizers
          skip-main-build: "true"
          ctest-env: ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1

  build-debian:
    name: X11 / Debian ${{ matrix.codename }}
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: bookworm
          - codename: trixie
    container:
      image: debian:${{ matrix.codename }}
      options: --ulimit core=-1 --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake make pkg-config g++ git ca-certificates ccache \
            libx11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-keysyms1-dev \
            libxkbcommon-dev libxkbfile-dev libxfixes-dev liblua5.4-dev \
            libcairo2-dev libpango1.0-dev \
            libfontconfig1-dev libfreetype-dev libpng-dev \
            libspdlog-dev \
            fonts-dejavu-core

      - uses: ./.github/actions/build-and-test
        with:
          ccache-key: x11-debian-${{ matrix.codename }}
          artifact-name: coredumps-x11-debian-${{ matrix.codename }}

  build-fedora:
    name: X11 / Fedora 41
    runs-on: ubuntu-latest
    needs: checks
    container:
      image: fedora:41
      options: --ulimit core=-1 --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            cmake make pkgconf gcc-c++ git ccache \
            libX11-devel libxcb-devel xcb-util-keysyms-devel \
            libxkbcommon-devel libxkbfile-devel libXfixes-devel lua-devel \
            cairo-devel pango-devel \
            fontconfig-devel freetype-devel libpng-devel \
            spdlog-devel \
            dejavu-fonts-all

      - uses: ./.github/actions/build-and-test
        with:
          ccache-key: x11-fedora-41
          artifact-name: coredumps-x11-fedora-41

  build-arch:
    name: X11 / Arch Linux
    runs-on: ubuntu-latest
    needs: checks
    container:
      image: archlinux:latest
      options: --ulimit core=-1 --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            cmake make pkgconf gcc git ccache \
            libx11 libxcb xcb-util-keysyms \
            libxkbcommon libxkbfile libxfixes lua \
            cairo pango fontconfig freetype2 libpng \
            spdlog \
            ttf-dejavu

      - uses: ./.github/actions/build-and-test
        with:
          ccache-key: x11-arch
          artifact-name: coredumps-x11-arch

  integration:
    name: X11 / Integration (Xephyr)
    runs-on: ubuntu-24.04
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake make pkg-config g++ ccache \
            libx11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-keysyms1-dev \
            libxkbcommon-dev libxkbfile-dev libxfixes-dev liblua5.4-dev \
            libcairo2-dev libpango1.0-dev \
            libfontconfig1-dev libfreetype-dev libpng-dev \
            libspdlog-dev \
            xvfb xserver-xephyr \
            x11-utils x11-apps xterm wmctrl \
            fonts-dejavu-core xfonts-base

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: x11-integration-ubuntu-24.04
          max-size: 500M

      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build -j$(nproc)

      - name: Run integration tests
        run: |
          echo '/tmp/cores/core.%e.%p' | sudo tee /proc/sys/kernel/core_pattern
          mkdir -p /tmp/cores
          ulimit -c unlimited
          Xvfb :98 -screen 0 1280x720x24 &
          XVFB_PID=$!
          sleep 1
          DISPLAY=:98 bash tests/integration/run_tests.sh
          EXIT=$?
          kill $XVFB_PID 2>/dev/null || true
          exit $EXIT

      - name: Upload core dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coredumps-x11-integration
          path: |
            /tmp/cores/
            /tmp/sirenwm-itest/
            output/sirenwm-x11
          if-no-files-found: ignore
          retention-days: 7
